name: ios_adaptive_context_menu
description: Flutter plugin for adaptive single-tap context menus on iOS and Android.
version: 0.1.4
homepage: https://github.com/shahmeer1124/ios_adaptive_context_menu
repository: https://github.com/shahmeer1124/ios_adaptive_context_menu
issue_tracker: https://github.com/shahmeer1124/ios_adaptive_context_menu/issues
documentation: https://github.com/shahmeer1124/ios_adaptive_context_menu#readme
platforms:
  android:
  ios:
topics:
  - ios
  - android
  - context-menu
  - flutter-plugin
  - cupertino
screenshots:
  - description: iOS native single-tap context menu with actions and submenu.
    path: screenshots/ios-context-menu.png
  - description: Android popup menu behavior using the same package API.
    path: screenshots/android-context-menu.png

environment:
  sdk: ^3.0.0
  flutter: ">=3.13.0"

dependencies:
  flutter:
    sdk: flutter
  svg_flutter: ^0.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  plugin:
    platforms:
      android:
        package: com.shahmeer.ios_adaptive_context_menu
        pluginClass: IosAdaptiveContextMenuPlugin
      ios:
        pluginClass: IosSingleTapContextMenuPlugin
